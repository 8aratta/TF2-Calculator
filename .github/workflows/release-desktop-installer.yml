name: Release desktop installer

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to create or update (for example: v0.1.0)'
        required: true
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package-and-release:
    name: Package and upload installer
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Validate manual input tag
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace("${env:RELEASE_TAG}")) {
            throw "release_tag is required when running manually."
          }

          if (-not $env:RELEASE_TAG.StartsWith('v')) {
            throw "release_tag must start with 'v' (for example v0.1.0)."
          }

      - name: Install dependencies
        run: npm ci

      - name: Build and package desktop app
        run: npm run desktop:package

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-installer-${{ env.RELEASE_TAG }}
          path: |
            apps/desktop/dist/*.exe
            apps/desktop/dist/*.yml
            apps/desktop/dist/win-unpacked/**
          if-no-files-found: error

      - name: Create or update GitHub release with installer assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            apps/desktop/dist/*.exe
            apps/desktop/dist/*.yml
